name: Deploy ADF

on:
  push:
    branches:
      - adf_publish

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM template
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.TARGET_RG }}
          template: ./adf_publish/ARMTemplateForFactory.json
          parameters: ./adf_publish/ARMTemplateParametersForFactory.json factoryName=${{ secrets.TARGET_ADF_NAME }}
